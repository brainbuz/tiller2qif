name    = Finance-Tiller2QIF
version = 1.01
abstract = Convert Tiller CSV exports to QIF
author  = brainbuz@cpan.org
license = GPL_3
copyright_holder = John Karr

[GatherDir]

[PkgVersion]
[PruneCruft]
[ManifestSkip]
[MetaYAML]
[MetaJSON]
[ReadmeAnyFromPod / Readme]
typ = pod
filename = README.md
location = root
[ExecDir]
[ShareDir]
[MakeMaker]
[Manifest]
; [License]
[TestRelease]
[ConfirmRelease]
[UploadToCPAN]
[RunExtraTests]

; Inject lib/Finance/Tiller2QIF.pod at the '## POD ##' placeholder in
; both the main module and the bin script. Source POD lives in the
; .pod file; placeholders in the .pm/.pl files are replaced at build.
[Run::AfterBuild]
run = perl bin/inject_pod.pl lib/Finance/Tiller2QIF.pod %d/lib/Finance/Tiller2QIF.pm %d/bin/tiller2qif

; bin/inject_pod.pl is a build-time helper, not part of the dist.
[PruneFiles]
filename = bin/inject_pod.pl

[Prereqs]
perl = 5.034
DBI = 0
Path::Tiny = 0
Text::CSV = 0
Mojo::SQLite = 0
DateTime::Format::Flexible = 0
Cpanel::JSON::XS = 0
Getopt::Long::Descriptive = 0
Test2::V0 = 0
Test2::Bundle::More = 0
